<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced To-Do App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6366f1,#ec4899,#f59e0b);
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
background:#6366f1;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

ul{
list-style:none;
margin-top:20px;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
background:#f3f4f6;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.completed{
text-decoration:line-through;
opacity:0.6;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>To-Do App</h1>

<div class="input-box">
<input id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
const taskList = document.getElementById("taskList");

function renderTasks(){
taskList.innerHTML="";
tasks.forEach((task,index)=>{
let li=document.createElement("li");

li.innerHTML = `
<span onclick="toggleTask(${index})" class="${task.completed ? 'completed':''}">
${task.text}
</span>
<button class="delete" onclick="deleteTask(${index})">X</button>
`;

taskList.appendChild(li);
});
}

function addTask(){

let input=document.getElementById("taskInput");
let text=input.value.trim();

if(text==="") return;

tasks.push({text:text,completed:false});

localStorage.setItem("tasks",JSON.stringify(tasks));

input.value="";

renderTasks();
}

function deleteTask(index){

tasks.splice(index,1);

localStorage.setItem("tasks",JSON.stringify(tasks));

renderTasks();
}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

localStorage.setItem("tasks",JSON.stringify(tasks));

renderTasks();
}

renderTasks();

</script>

</body>
</html>
